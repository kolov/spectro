<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spectrometer Box Design — Transmission Grating</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }
  .controls { padding: 4px 20px; background: #16213e; display: flex; flex-wrap: wrap; gap: 18px; align-items: center; border-bottom: 1px solid #0f3460; }
  .control-group { display: flex; flex-direction: column; gap: 2px; }
  .control-group label { font-size: 11px; color: #aaa; text-transform: uppercase; }
  .control-group .value { font-size: 13px; color: #e94560; font-weight: bold; }
  input[type=range] { width: 150px; accent-color: #e94560; }
  canvas { flex: 1; }
  .dims { padding: 10px 20px; background: #0f3460; font-size: 13px; display: flex; gap: 20px; flex-wrap: wrap; border-top: 1px solid #0f3460; }
  .dims .item { display: flex; flex-direction: column; }
  .dims .item .lbl { font-size: 10px; color: #888; text-transform: uppercase; }
  .dims .item .val { color: #e94560; font-weight: bold; font-size: 14px; }
</style>
</head>
<body>

<div style="position:relative; margin:4px 20px 1em;">
  <h1 style="font-size:28px; color:#e94560; text-align:center; margin:0;">Spectrometer Box Design — Transmission Grating</h1>
  <a href="https://github.com/kolov/spectro" target="_blank" style="position:absolute; right:0; top:50%; transform:translateY(-50%); color:#4ea8de; font-size:13px; text-decoration:underline;">GitHub</a>
</div>

<div class="controls">
  <div class="control-group">
    <label>Slit to Grating (mm)</label>
    <input type="range" id="slitDist" min="20" max="200" value="80">
    <div class="value" id="slitDistVal">80</div>
  </div>
  <div class="control-group">
    <label>Grating (lines/mm)</label>
    <input type="range" id="gratingDensity" min="300" max="1800" step="100" value="600">
    <div class="value" id="gratingDensityVal">600</div>
  </div>
  <div class="control-group">
    <label>Grating to Lens (mm)</label>
    <input type="range" id="sensorDist" min="20" max="200" value="80">
    <div class="value" id="sensorDistVal">80</div>
  </div>
  <div class="control-group">
    <label>Lambda min (nm)</label>
    <input type="range" id="lambdaMin" min="200" max="600" step="5" value="350">
    <div class="value" id="lambdaMinVal">350</div>
  </div>
  <div class="control-group">
    <label>Lambda max (nm)</label>
    <input type="range" id="lambdaMax" min="400" max="900" step="5" value="800">
    <div class="value" id="lambdaMaxVal">800</div>
  </div>
  <div class="control-group">
    <label>Grating tilt (deg)</label>
    <input type="range" id="incAngle" min="0" max="45" step="1" value="0">
    <div class="value" id="incAngleVal">0</div>
  </div>
  <div class="control-group">
    <label>Diffraction order</label>
    <input type="range" id="diffOrder" min="1" max="3" step="1" value="1">
    <div class="value" id="diffOrderVal">1</div>
  </div>
  <div class="control-group">
    <label>Grating height (mm)</label>
    <input type="range" id="gratingHeight" min="10" max="80" value="36">
    <div class="value" id="gratingHeightVal">36</div>
  </div>
  <div class="control-group">
    <label>Grating-bottom gap (mm)</label>
    <input type="range" id="gratingGap" min="0" max="30" value="0">
    <div class="value" id="gratingGapVal">0</div>
  </div>
  <div class="control-group">
    <label>Extra box length (mm)</label>
    <input type="range" id="boxExtra" min="0" max="100" value="0">
    <div class="value" id="boxExtraVal">0</div>
  </div>
  <div class="control-group">
    <label>Lens body diam (mm)</label>
    <input type="range" id="lensBodyDiam" min="20" max="100" value="67">
    <div class="value" id="lensBodyDiamVal">67</div>
  </div>
  <div class="control-group">
    <label>Lens aperture (mm)</label>
    <input type="range" id="lensAperture" min="10" max="80" value="30">
    <div class="value" id="lensApertureVal">30</div>
  </div>
  <div class="control-group">
    <label>Barrel length (mm)</label>
    <input type="range" id="barrelLength" min="30" max="200" step="1" value="120">
    <div class="value" id="barrelLengthVal">120</div>
  </div>
  <div class="control-group">
    <label>Focal length (mm)</label>
    <input type="range" id="focalLength" min="10" max="200" step="1" value="50">
    <div class="value" id="focalLengthVal">50</div>
  </div>
  <div class="control-group">
    <label>Sensor width (mm)</label>
    <input type="range" id="cameraSensor" min="5" max="44" step="0.5" value="32.5">
    <div class="value" id="cameraSensorVal">32.5</div>
  </div>
  <button id="showCutout" style="padding:8px 16px; background:#e94560; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:13px; align-self:center;">Show Cutout</button>
</div>

<div class="dims" id="dims"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const controls = ['slitDist','gratingDensity','sensorDist','lambdaMin','lambdaMax','incAngle','diffOrder','gratingHeight','gratingGap','boxExtra','lensBodyDiam','lensAperture','barrelLength','focalLength','cameraSensor'];
controls.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { document.getElementById(id+'Val').textContent = el.value; draw(); });
});

function getParams() {
  return {
    slitDist: +document.getElementById('slitDist').value,
    N: +document.getElementById('gratingDensity').value,
    sensorDist: +document.getElementById('sensorDist').value,
    lambdaMin: +document.getElementById('lambdaMin').value,
    lambdaMax: +document.getElementById('lambdaMax').value,
    incAngleDeg: +document.getElementById('incAngle').value,
    m: +document.getElementById('diffOrder').value,
    gratingHeight: +document.getElementById('gratingHeight').value,
    gratingGap: +document.getElementById('gratingGap').value,
    boxExtra: +document.getElementById('boxExtra').value,
    lensBodyDiam: +document.getElementById('lensBodyDiam').value,
    lensAperture: +document.getElementById('lensAperture').value,
    barrelLength: +document.getElementById('barrelLength').value,
    focalLength: +document.getElementById('focalLength').value,
    cameraSensor: +document.getElementById('cameraSensor').value,
  };
}

function wavelengthToRGB(nm) {
  let r=0, g=0, b=0;
  if (nm < 380) { r=0.4; g=0; b=0.4; }
  else if (nm < 440) { r=-(nm-440)/(440-380); g=0; b=1; }
  else if (nm < 490) { r=0; g=(nm-440)/(490-440); b=1; }
  else if (nm < 510) { r=0; g=1; b=-(nm-510)/(510-490); }
  else if (nm < 580) { r=(nm-510)/(580-510); g=1; b=0; }
  else if (nm < 645) { r=1; g=-(nm-645)/(645-580); b=0; }
  else if (nm < 781) { r=1; g=0; b=0; }
  else { r=0.5; g=0; b=0; }
  let factor = 1.0;
  if (nm < 380) factor = 0.3;
  else if (nm < 420) factor = 0.3 + 0.7*(nm-380)/(420-380);
  else if (nm > 700) factor = 0.3 + 0.7*(780-nm)/(780-700);
  if (nm > 780) factor = 0.2;
  return `rgb(${Math.round(r*factor*255)},${Math.round(g*factor*255)},${Math.round(b*factor*255)})`;
}

// Transmission grating: d·(sin(beta) - sin(alpha)) = m·lambda
// alpha = incidence angle, beta = diffraction angle (both from normal, on exit side)
// sin(beta) = sin(alpha) + m·lambda/d
// Returns the absolute exit angle from horizontal.
// Internally: sin(β) = sin(α) + m·λ/d where β is from grating normal.
// With grating tilted by α, the absolute direction is (β - α).
function diffractionAngle(lambdaNm, N, incAngleDeg, m) {
  const d = 1.0 / N; // mm per line
  const lambdaMm = lambdaNm * 1e-6;
  const alpha = incAngleDeg * Math.PI / 180;
  const sinBeta = Math.sin(alpha) + m * lambdaMm / d;
  if (sinBeta < -1 || sinBeta > 1) return null;
  return Math.asin(sinBeta) - alpha;
}

// Draw a dimension line with arrows and label
function drawDimension(x1, y1, x2, y2, label, offset, side) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 1) return;
  const nx = -dy/len * offset * side;
  const ny = dx/len * offset * side;
  const ax1 = x1 + nx, ay1 = y1 + ny;
  const ax2 = x2 + nx, ay2 = y2 + ny;

  ctx.strokeStyle = '#88aacc';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  // Extension lines
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(ax1, ay1);
  ctx.moveTo(x2, y2); ctx.lineTo(ax2, ay2);
  ctx.stroke();

  // Dimension line
  ctx.beginPath();
  ctx.moveTo(ax1, ay1); ctx.lineTo(ax2, ay2);
  ctx.stroke();

  // Arrowheads
  const arrowLen = 8, arrowW = 3;
  const ux = dx/len, uy = dy/len;
  ctx.fillStyle = '#88aacc';
  ctx.beginPath();
  ctx.moveTo(ax1, ay1);
  ctx.lineTo(ax1 + ux*arrowLen + uy*arrowW, ay1 + uy*arrowLen - ux*arrowW);
  ctx.lineTo(ax1 + ux*arrowLen - uy*arrowW, ay1 + uy*arrowLen + ux*arrowW);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ax2, ay2);
  ctx.lineTo(ax2 - ux*arrowLen + uy*arrowW, ay2 - uy*arrowLen - ux*arrowW);
  ctx.lineTo(ax2 - ux*arrowLen - uy*arrowW, ay2 - uy*arrowLen + ux*arrowW);
  ctx.closePath(); ctx.fill();

  // Label
  const mx = (ax1+ax2)/2, my = (ay1+ay2)/2;
  ctx.save();
  ctx.translate(mx, my);
  let angle = Math.atan2(dy, dx);
  if (angle > Math.PI/2) angle -= Math.PI;
  if (angle < -Math.PI/2) angle += Math.PI;
  ctx.rotate(angle);
  ctx.fillStyle = '#cde';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(label, 0, -5);
  ctx.restore();
}

function draw() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const p = getParams();
  const alpha = p.incAngleDeg * Math.PI / 180;

  // Coordinate system (mm): grating at origin
  // X = horizontal (light travels left to right, +X direction)
  // Y = vertical (perpendicular to optical axis)
  // Grating is vertical (along Y axis), normal points +X
  // Slit is to the left, sensor to the right

  // Slit position: light enters horizontally at grating center height
  // Grating is tilted by alpha, but slit stays on the horizontal axis
  const slitX_mm = -p.slitDist;
  const slitY_mm = 0;

  // Compute diffraction angles for each wavelength
  const step = 5;
  const rays = [];
  for (let lam = p.lambdaMin; lam <= p.lambdaMax; lam += step) {
    const beta = diffractionAngle(lam, p.N, p.incAngleDeg, p.m);
    if (beta !== null) rays.push({ nm: lam, beta });
  }

  if (rays.length < 2) {
    ctx.fillStyle = '#e94560';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('No valid diffraction for these parameters!', W/2, H/2);
    ctx.font = '14px Arial';
    ctx.fillText('Try reducing grating density, wavelength range, or diffraction order', W/2, H/2 + 30);
    document.getElementById('dims').innerHTML = '';
    return;
  }

  // Central diffraction angle (for sensor orientation)
  const centralBeta = diffractionAngle((p.lambdaMin + p.lambdaMax) / 2, p.N, p.incAngleDeg, p.m);

  // Sensor center: along central diffracted ray at sensorDist
  // Diffracted ray direction for angle beta from normal (+X):
  // dx = cos(beta), dy = sin(beta)
  const scX_mm = p.sensorDist * Math.cos(centralBeta);
  const scY_mm = p.sensorDist * Math.sin(centralBeta);

  // Sensor tangent: perpendicular to central ray
  const stX = -Math.sin(centralBeta);
  const stY = Math.cos(centralBeta);

  // Find where each ray hits the sensor plane
  const hits = [];
  rays.forEach(({nm, beta}) => {
    // Ray direction (through grating, on exit side)
    const rdx = Math.cos(beta);
    const rdy = Math.sin(beta);
    // Intersect: origin + t*(rdx,rdy) = (scX,scY) + s*(stX,stY)
    const det = rdx * stY - rdy * stX;
    if (Math.abs(det) < 1e-10) return;
    const t = (scX_mm * stY - scY_mm * stX) / det;
    const s = (scX_mm * rdy - scY_mm * rdx) / det;
    hits.push({ nm, beta, x: rdx * t, y: rdy * t, s, t });
  });

  if (hits.length < 2) return;

  // Bounding box in mm
  const sMinS = Math.min(...hits.map(h => h.s));
  const sMaxS = Math.max(...hits.map(h => h.s));
  const sensorMargin_mm = 3;
  const s1x_mm = scX_mm + stX * (sMinS - sensorMargin_mm);
  const s1y_mm = scY_mm + stY * (sMinS - sensorMargin_mm);
  const s2x_mm = scX_mm + stX * (sMaxS + sensorMargin_mm);
  const s2y_mm = scY_mm + stY * (sMaxS + sensorMargin_mm);

  // Box sized to fit optics only (slit, grating, sensor)
  // Grating endpoints with tilt: direction (sin(alpha), cos(alpha))
  const grTopX = Math.sin(alpha) * p.gratingHeight / 2;
  const grTopY = Math.cos(alpha) * p.gratingHeight / 2;
  const grBotX = -Math.sin(alpha) * p.gratingHeight / 2;
  const grBotY = -Math.cos(alpha) * p.gratingHeight / 2;
  const gratingBottom_mm = Math.min(grBotY, grTopY);
  const boxBottomFromGrating = p.gratingGap;
  const allX = [grTopX, grBotX, s1x_mm, s2x_mm, ...hits.map(h=>h.x)];
  const allY = [slitY_mm, grTopY, grBotY, s1y_mm, s2y_mm, ...hits.map(h=>h.y)];
  const wallPad = 10;
  const boxMinX = slitX_mm; // slit sits on the left wall
  const boxMaxX = Math.max(...allX) + wallPad + p.boxExtra;
  const boxMinY = gratingBottom_mm - boxBottomFromGrating;
  const boxMaxY = Math.max(...allY) + wallPad;
  const boxW_mm = boxMaxX - boxMinX;
  const boxH_mm = boxMaxY - boxMinY;

  // Lens cylinder: glass (front) at spectrum position, barrel extends away from grating
  // cdx,cdy = direction FROM grating TO spectrum. Barrel continues in this direction.
  const cdx = Math.cos(centralBeta);
  const cdy = Math.sin(centralBeta);
  const lpx = -Math.sin(centralBeta);
  const lpy = Math.cos(centralBeta);
  const lensR_mm = p.lensBodyDiam / 2;
  const lensBarrelLen = p.barrelLength;

  // Lens front (glass) at spectrum position, sensor at far end of barrel
  const lensFront = { x: scX_mm, y: scY_mm }; // glass, faces grating
  const lensBack = { x: scX_mm + lensBarrelLen * cdx, y: scY_mm + lensBarrelLen * cdy }; // sensor end
  const lensCorners = [
    { x: lensBack.x + lpx * lensR_mm, y: lensBack.y + lpy * lensR_mm },
    { x: lensBack.x - lpx * lensR_mm, y: lensBack.y - lpy * lensR_mm },
    { x: lensFront.x + lpx * lensR_mm, y: lensFront.y + lpy * lensR_mm },
    { x: lensFront.x - lpx * lensR_mm, y: lensFront.y - lpy * lensR_mm },
  ];

  // Visible extent includes both box and lens
  const visMinX = Math.min(boxMinX, ...lensCorners.map(c => c.x)) - 5;
  const visMaxX = Math.max(boxMaxX, ...lensCorners.map(c => c.x)) + 5;
  const visMinY = Math.min(boxMinY, ...lensCorners.map(c => c.y)) - 5;
  const visMaxY = Math.max(boxMaxY, ...lensCorners.map(c => c.y)) + 5;
  const visW_mm = visMaxX - visMinX;
  const visH_mm = visMaxY - visMinY;

  // Scale to fit the full visible extent
  const margin = 110;
  const drawW = W - 2 * margin;
  const drawH = H - 2 * margin;
  const scale = Math.min(drawW / visW_mm, drawH / visH_mm) * 0.85;

  const centerX_mm = (visMinX + visMaxX) / 2;
  const centerY_mm = (visMinY + visMaxY) / 2;
  function toScr(xmm, ymm) {
    return [
      W/2 + (xmm - centerX_mm) * scale,
      H/2 - (ymm - centerY_mm) * scale
    ];
  }

  // ---- BOX ----
  const [bx0, by0] = toScr(boxMinX, boxMaxY);
  const [bx1, by1] = toScr(boxMaxX, boxMinY);

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(bx0, by0, bx1 - bx0, by1 - by0);
  ctx.strokeStyle = '#4a6fa5';
  ctx.lineWidth = 3;
  ctx.setLineDash([]);
  ctx.strokeRect(bx0, by0, bx1 - bx0, by1 - by0);

  // ---- SLIT ----
  const [slSx, slSy] = toScr(slitX_mm, slitY_mm);
  const slitDrawLen = 14;
  // Slit is perpendicular to incident ray direction
  const incDirX = Math.cos(alpha), incDirY = Math.sin(alpha);
  const slitNx = -incDirY, slitNy = incDirX;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(slSx + slitNx * slitDrawLen, slSy - slitNy * slitDrawLen);
  ctx.lineTo(slSx + slitNx * 3, slSy - slitNy * 3);
  ctx.moveTo(slSx - slitNx * 3, slSy + slitNy * 3);
  ctx.lineTo(slSx - slitNx * slitDrawLen, slSy + slitNy * slitDrawLen);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,200,0.8)';
  ctx.beginPath();
  ctx.arc(slSx, slSy, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ccc';
  ctx.font = '13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SLIT', slSx, slSy - 22);

  // ---- GRATING (tilted by alpha from vertical) ----
  const [grSx, grSy] = toScr(0, 0);
  const gratingHeight_mm = p.gratingHeight;
  const grDrawLen = (gratingHeight_mm / 2) * scale;
  // Grating direction: tilted by alpha from vertical (Y axis)
  // Vertical is (0,1) in mm = (0,-1) on screen. Tilt rotates toward +X.
  // Grating line direction in mm: (sin(alpha), cos(alpha))
  const grDirX_mm = Math.sin(alpha);
  const grDirY_mm = Math.cos(alpha);
  const [grTopSx, grTopSy] = toScr(grDirX_mm * gratingHeight_mm/2, grDirY_mm * gratingHeight_mm/2);
  const [grBotSx, grBotSy] = toScr(-grDirX_mm * gratingHeight_mm/2, -grDirY_mm * gratingHeight_mm/2);
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(grTopSx, grTopSy);
  ctx.lineTo(grBotSx, grBotSy);
  ctx.stroke();
  // Hash marks (perpendicular to grating line)
  ctx.lineWidth = 1;
  const hashSpacing = Math.max(3, Math.min(6, grDrawLen / 8));
  const hashPerpX = -grDirY_mm; // perpendicular in mm
  const hashPerpY = grDirX_mm;
  const hashLen = 5 / scale; // 5 screen pixels in mm
  const numHashes = Math.floor(grDrawLen * 2 / hashSpacing);
  for (let i = 1; i < numHashes; i++) {
    const frac = -1 + 2 * i / numHashes;
    const hx = grDirX_mm * gratingHeight_mm/2 * frac;
    const hy = grDirY_mm * gratingHeight_mm/2 * frac;
    const [hsx, hsy] = toScr(hx, hy);
    const [h1x, h1y] = toScr(hx + hashPerpX * hashLen, hy + hashPerpY * hashLen);
    const [h2x, h2y] = toScr(hx - hashPerpX * hashLen, hy - hashPerpY * hashLen);
    ctx.beginPath();
    ctx.moveTo(h1x, h1y);
    ctx.lineTo(h2x, h2y);
    ctx.stroke();
  }
  ctx.fillStyle = '#e94560';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`GRATING`, grBotSx, grBotSy + 16);
  ctx.fillText(`${p.N} l/mm, ${gratingHeight_mm}mm`, grBotSx, grBotSy + 30);

  // ---- GRATING NORMAL (dashed, perpendicular to grating surface) ----
  // Normal direction in mm: (cos(alpha), -sin(alpha)) pointing toward incoming light side
  // Actually for transmission grating, normal points +X when tilt=0.
  // With tilt alpha, normal = (cos(alpha), sin(alpha)) ... wait:
  // Grating line is along (sin(alpha), cos(alpha)). Normal (pointing toward +X side) is (cos(alpha), -sin(alpha)).
  const normDirX = Math.cos(alpha);
  const normDirY = -Math.sin(alpha);
  const normLen_mm = 20;
  const [nEx, nEy] = toScr(normDirX * normLen_mm, normDirY * normLen_mm);
  const [nEx2, nEy2] = toScr(-normDirX * normLen_mm, -normDirY * normLen_mm);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(nEx2, nEy2);
  ctx.lineTo(nEx, nEy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#555';
  ctx.font = '10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('normal', nEx + 3, nEy - 4);

  // ---- GRATING TILT ARC (between vertical and grating line) ----
  if (p.incAngleDeg > 0) {
    const arcR = 25;
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // On screen: vertical (up) is -PI/2. Grating tilts toward +X (right).
    // Arc from vertical to grating direction
    const vertAngle = -Math.PI / 2; // straight up on screen
    const grAngle = vertAngle + alpha; // tilted toward right
    ctx.arc(grSx, grSy, arcR, vertAngle, grAngle);
    ctx.stroke();
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Arial';
    ctx.textAlign = 'left';
    const arcMidA = vertAngle + alpha / 2;
    ctx.fillText(`tilt=${p.incAngleDeg}°`, grSx + (arcR+5)*Math.cos(arcMidA), grSy + (arcR+5)*Math.sin(arcMidA));
  }

  // ---- INCIDENT RAY ----
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(slSx, slSy);
  ctx.lineTo(grSx, grSy);
  ctx.stroke();
  // Arrow on incident ray
  const iMx = (slSx + grSx) / 2, iMy = (slSy + grSy) / 2;
  const iux = (grSx - slSx) / p.slitDist, iuy = (grSy - slSy) / p.slitDist;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(iMx + iux*8, iMy + iuy*8);
  ctx.lineTo(iMx - iux*4 + iuy*4, iMy - iuy*4 - iux*4);
  ctx.lineTo(iMx - iux*4 - iuy*4, iMy - iuy*4 + iux*4);
  ctx.closePath(); ctx.fill();

  // ---- DIFFRACTED RAYS ----
  hits.forEach(({nm, x, y}) => {
    const [hx, hy] = toScr(x, y);
    ctx.strokeStyle = wavelengthToRGB(nm);
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(grSx, grSy);
    ctx.lineTo(hx, hy);
    ctx.stroke();
    ctx.globalAlpha = 1.0;
  });

  // ---- SENSOR ----
  const [ss1x, ss1y] = toScr(s1x_mm, s1y_mm);
  const [ss2x, ss2y] = toScr(s2x_mm, s2y_mm);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(ss1x, ss1y);
  ctx.lineTo(ss2x, ss2y);
  ctx.stroke();

  // Spectrum dots on sensor
  hits.forEach(({nm, x, y}) => {
    const [hx, hy] = toScr(x, y);
    ctx.fillStyle = wavelengthToRGB(nm);
    ctx.beginPath();
    ctx.arc(hx, hy, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Wavelength labels
  const labelWavelengths = [p.lambdaMin, 400, 450, 500, 550, 600, 650, 700, 750, p.lambdaMax];
  const labeled = new Set();
  hits.forEach(({nm, x, y}) => {
    for (const lw of labelWavelengths) {
      if (Math.abs(nm - lw) <= step/2 && !labeled.has(lw)) {
        labeled.add(lw);
        const [hx, hy] = toScr(x, y);
        ctx.fillStyle = '#ddd';
        ctx.font = '10px Arial';
        ctx.save();
        ctx.translate(hx, hy);
        const la = Math.atan2(ss2y - ss1y, ss2x - ss1x);
        ctx.rotate(la);
        ctx.textAlign = 'center';
        ctx.fillText(`${lw}`, 0, -8);
        ctx.restore();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        const pdx = -(ss2y-ss1y), pdy = (ss2x-ss1x);
        const pl = Math.sqrt(pdx*pdx+pdy*pdy);
        ctx.beginPath();
        ctx.moveTo(hx - pdx/pl*4, hy - pdy/pl*4);
        ctx.lineTo(hx + pdx/pl*4, hy + pdy/pl*4);
        ctx.stroke();
      }
    }
  });

  // Sensor label
  ctx.fillStyle = '#ccc';
  ctx.font = '13px Arial';
  ctx.textAlign = 'center';
  const [scSx, scSy] = toScr(scX_mm, scY_mm);
  ctx.fillText('SENSOR', (ss1x+ss2x)/2 + 15, Math.max(ss1y, ss2y) + 22);

  // ---- CAMERA FIELD OF VIEW ----
  // For each ray, position on camera sensor = f * tan(β - centralBeta)
  // Highlight captured portion of spectrum
  const halfSensor = p.cameraSensor / 2;
  const capturedHits = hits.filter(h => {
    const pos = p.focalLength * Math.tan(h.beta - centralBeta);
    return Math.abs(pos) <= halfSensor;
  });

  // FOV boundary rays: from sensor edges through lens optical center
  // Optical center is at focal length from sensor, toward the glass
  const optCenterX = lensBack.x - p.focalLength * cdx;
  const optCenterY = lensBack.y - p.focalLength * cdy;
  const fovHalfAngle = Math.atan2(halfSensor, p.focalLength);

  // Sensor edge positions (perpendicular to optical axis)
  const sensorEdges = [
    { x: lensBack.x + halfSensor * lpx, y: lensBack.y + halfSensor * lpy },
    { x: lensBack.x - halfSensor * lpx, y: lensBack.y - halfSensor * lpy },
  ];

  sensorEdges.forEach(edge => {
    const [edgeSx, edgeSy] = toScr(edge.x, edge.y);
    // Direction from sensor edge through optical center
    const dirX = optCenterX - edge.x;
    const dirY = optCenterY - edge.y;
    const dirLen = Math.sqrt(dirX * dirX + dirY * dirY);
    // Extend well past the optical center toward the spectrum
    const extLen = p.sensorDist + lensBarrelLen + 30;
    const farX = edge.x + dirX / dirLen * extLen;
    const farY = edge.y + dirY / dirLen * extLen;
    const [farSx, farSy] = toScr(farX, farY);
    ctx.strokeStyle = 'rgba(0,255,0,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(edgeSx, edgeSy);
    ctx.lineTo(farSx, farSy);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // FOV label near optical center
  const [ocSx, ocSy] = toScr(optCenterX, optCenterY);
  ctx.fillStyle = 'rgba(0,255,0,0.5)';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`FOV ${(fovHalfAngle * 2 * 180 / Math.PI).toFixed(1)}°`, ocSx, ocSy - 12);

  // Find captured wavelength range
  let capturedMinNm = null, capturedMaxNm = null;
  if (capturedHits.length > 0) {
    capturedMinNm = Math.min(...capturedHits.map(h => h.nm));
    capturedMaxNm = Math.max(...capturedHits.map(h => h.nm));

    // Draw bright highlight on captured portion of sensor
    const capFirst = capturedHits[0];
    const capLast = capturedHits[capturedHits.length - 1];
    const [cf1x, cf1y] = toScr(capFirst.x, capFirst.y);
    const [cf2x, cf2y] = toScr(capLast.x, capLast.y);
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 5;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(cf1x, cf1y);
    ctx.lineTo(cf2x, cf2y);
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    // Bracket marks at edges of captured range
    const bLen = 8;
    const pdx = -(ss2y-ss1y), pdy = (ss2x-ss1x);
    const pl = Math.sqrt(pdx*pdx+pdy*pdy);
    const bnx = pdx/pl * bLen, bny = pdy/pl * bLen;
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cf1x - bnx, cf1y - bny);
    ctx.lineTo(cf1x + bnx, cf1y + bny);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cf2x - bnx, cf2y - bny);
    ctx.lineTo(cf2x + bnx, cf2y + bny);
    ctx.stroke();

    // Label captured range
    ctx.fillStyle = '#0f0';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    const cmx = (cf1x + cf2x) / 2, cmy = (cf1y + cf2y) / 2;
    ctx.fillText(`Camera: ${capturedMinNm}-${capturedMaxNm}nm`, cmx + 15, Math.max(cf1y, cf2y) + 36);
  }

  // ---- 0-ORDER (undiffracted) RAY ----
  // 0-order passes straight through the grating horizontally.
  // Check if its image lands on the camera sensor.
  const zeroOrderSensorPos = p.focalLength * Math.tan(0 - centralBeta);
  const zeroOrderOnSensor = Math.abs(zeroOrderSensorPos) <= halfSensor;

  // Draw full 0-order ray: slit → grating → continues horizontally → sensor plane
  const zeroColor = zeroOrderOnSensor ? 'rgba(255,100,100,0.6)' : 'rgba(255,255,255,0.25)';
  // Slit to grating
  ctx.strokeStyle = zeroColor;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(slSx, slSy);
  ctx.lineTo(grSx, grSy);
  ctx.stroke();
  // Grating onward (horizontal)
  const zrdx = 1, zrdy = 0;
  const zdet = zrdx * stY - zrdy * stX;
  if (Math.abs(zdet) > 1e-10) {
    const zt = (scX_mm * stY - scY_mm * stX) / zdet;
    const zHitX = zrdx * zt, zHitY = zrdy * zt;
    const [zhx, zhy] = toScr(zHitX, zHitY);
    ctx.beginPath();
    ctx.moveTo(grSx, grSy);
    ctx.lineTo(zhx, zhy);
    ctx.stroke();
    ctx.setLineDash([]);
    // Mark hit point on sensor plane
    ctx.fillStyle = zeroOrderOnSensor ? '#ff4444' : 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(zhx, zhy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = zeroOrderOnSensor ? '#ff4444' : '#888';
    ctx.font = '10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`0-order${zeroOrderOnSensor ? ' (IN FRAME!)' : ''}`, zhx + 8, zhy + 4);
  } else {
    ctx.setLineDash([]);
  }

  // ---- LENS CYLINDER (top-down = rectangle) ----
  // 4 corners on screen
  const lcScr = lensCorners.map(c => toScr(c.x, c.y));
  const [lfScr_x, lfScr_y] = toScr(lensFront.x, lensFront.y);
  const [lbScr_x, lbScr_y] = toScr(lensBack.x, lensBack.y);

  // Fill lens body (semi-transparent)
  ctx.fillStyle = 'rgba(180,150,60,0.12)';
  ctx.beginPath();
  ctx.moveTo(lcScr[0][0], lcScr[0][1]);
  ctx.lineTo(lcScr[2][0], lcScr[2][1]);
  ctx.lineTo(lcScr[3][0], lcScr[3][1]);
  ctx.lineTo(lcScr[1][0], lcScr[1][1]);
  ctx.closePath();
  ctx.fill();

  // Lens body outline
  ctx.strokeStyle = '#c0a040';
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(lcScr[0][0], lcScr[0][1]);
  ctx.lineTo(lcScr[2][0], lcScr[2][1]);
  ctx.lineTo(lcScr[3][0], lcScr[3][1]);
  ctx.lineTo(lcScr[1][0], lcScr[1][1]);
  ctx.closePath();
  ctx.stroke();

  // Back face (sensor) — thicker line
  ctx.strokeStyle = '#e0d070';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lcScr[0][0], lcScr[0][1]);
  ctx.lineTo(lcScr[1][0], lcScr[1][1]);
  ctx.stroke();

  // Front face (aperture opening) — show effective aperture
  const apertureR_mm = p.lensAperture / 2;
  const apTL = toScr(lensFront.x + lpx * apertureR_mm, lensFront.y + lpy * apertureR_mm);
  const apBR = toScr(lensFront.x - lpx * apertureR_mm, lensFront.y - lpy * apertureR_mm);
  // Blocked parts of front face (body minus aperture)
  ctx.strokeStyle = '#c0a040';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lcScr[2][0], lcScr[2][1]);
  ctx.lineTo(apTL[0], apTL[1]);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(apBR[0], apBR[1]);
  ctx.lineTo(lcScr[3][0], lcScr[3][1]);
  ctx.stroke();
  // Aperture opening (gap in front face)
  ctx.strokeStyle = '#e0d070';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(apTL[0], apTL[1]);
  ctx.lineTo(apBR[0], apBR[1]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Label aperture
  ctx.fillStyle = '#e0d070';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`aperture ${p.lensAperture}mm`, lfScr_x, lfScr_y - lensR_mm * scale - 6);

  // Lens center axis dot
  const lensMidX = (lensBack.x + lensFront.x) / 2;
  const lensMidY = (lensBack.y + lensFront.y) / 2;
  const [lmSx, lmSy] = toScr(lensMidX, lensMidY);
  ctx.fillStyle = '#e0d070';
  ctx.beginPath();
  ctx.arc(lmSx, lmSy, 2, 0, Math.PI * 2);
  ctx.fill();

  // Label lens
  ctx.fillStyle = '#c0a040';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('LENS', lmSx, lmSy - lensR_mm * scale - 20);
  ctx.font = '10px Arial';
  ctx.fillText(`body ${p.lensBodyDiam}mm`, lmSx, lmSy - lensR_mm * scale - 34);

  // Label back face
  ctx.fillStyle = '#e0d070';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('sensor', lbScr_x, lbScr_y + lensR_mm * scale + 14);

  // ---- Show where lens crosses box walls (CUT markers) ----
  // For each box wall, find the portion inside the lens rectangle.
  // A point P is inside the lens rect if:
  //   0 <= (P - lensBack) · (cdx,cdy) <= lensBarrelLen
  //   -lensR_mm <= (P - lensBack) · (lpx,lpy) <= lensR_mm
  function pointInLens(px, py) {
    const vx = px - lensBack.x, vy = py - lensBack.y;
    const along = vx * cdx + vy * cdy;
    const perp = vx * lpx + vy * lpy;
    return along >= 0 && along <= lensBarrelLen && perp >= -lensR_mm && perp <= lensR_mm;
  }

  // For a box wall segment A→B, find t range [0,1] where the wall is inside the lens rect
  function wallInsideLens(ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const vx0 = ax - lensFront.x, vy0 = ay - lensFront.y;
    // Barrel axis is (+cdx, +cdy) from glass toward sensor
    const a0 = vx0 * cdx + vy0 * cdy, da = dx * cdx + dy * cdy;
    const p0 = vx0 * lpx + vy0 * lpy, dp = dx * lpx + dy * lpy;
    // Constraints: 0 <= a0+t*da <= barrelLen, -R <= p0+t*dp <= R
    let tMin = 0, tMax = 1;
    function clip(c0, dc, lo, hi) {
      if (Math.abs(dc) < 1e-10) {
        if (c0 < lo || c0 > hi) { tMin = 1; tMax = 0; }
        return;
      }
      let t1 = (lo - c0) / dc, t2 = (hi - c0) / dc;
      if (t1 > t2) { const tmp = t1; t1 = t2; t2 = tmp; }
      tMin = Math.max(tMin, t1);
      tMax = Math.min(tMax, t2);
    }
    clip(a0, da, 0, lensBarrelLen);
    clip(p0, dp, -lensR_mm, lensR_mm);
    if (tMin >= tMax) return null;
    return {
      x1: ax + tMin * dx, y1: ay + tMin * dy,
      x2: ax + tMax * dx, y2: ay + tMax * dy,
    };
  }

  const boxEdges = [
    { name: 'top', x1: boxMinX, y1: boxMaxY, x2: boxMaxX, y2: boxMaxY },
    { name: 'bottom', x1: boxMinX, y1: boxMinY, x2: boxMaxX, y2: boxMinY },
    { name: 'left', x1: boxMinX, y1: boxMinY, x2: boxMinX, y2: boxMaxY },
    { name: 'right', x1: boxMaxX, y1: boxMinY, x2: boxMaxX, y2: boxMaxY },
  ];

  ctx.strokeStyle = '#ff6600';
  ctx.lineWidth = 4;
  boxEdges.forEach(edge => {
    const cut = wallInsideLens(edge.x1, edge.y1, edge.x2, edge.y2);
    if (!cut) return;
    const [csx1, csy1] = toScr(cut.x1, cut.y1);
    const [csx2, csy2] = toScr(cut.x2, cut.y2);

    // Draw the cut segment
    ctx.beginPath();
    ctx.moveTo(csx1, csy1);
    ctx.lineTo(csx2, csy2);
    ctx.stroke();

    // Label cut length
    const cutLen = Math.sqrt((cut.x2 - cut.x1)**2 + (cut.y2 - cut.y1)**2);
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    const cutMx = (csx1+csx2)/2, cutMy = (csy1+csy2)/2;
    if (edge.name === 'top' || edge.name === 'bottom') {
      const off = edge.name === 'top' ? -14 : 18;
      ctx.fillText(`CUT ${cutLen.toFixed(0)}mm`, cutMx, cutMy + off);
    } else {
      ctx.save();
      const off = edge.name === 'left' ? -10 : 10;
      ctx.translate(cutMx + off, cutMy);
      ctx.rotate(-Math.PI/2);
      ctx.fillText(`CUT ${cutLen.toFixed(0)}mm`, 0, 0);
      ctx.restore();
    }
  });

  // ---- Lens focusing distance ----
  // Lens front (glass) at spectrum position (sensorDist from grating)
  const slitToLensFront_mm = p.slitDist + p.sensorDist;
  // Sensor at back of barrel
  const slitToSensor_mm = p.slitDist + p.sensorDist + lensBarrelLen;

  // Draw slit-to-lens distance
  drawDimension(slSx, slSy, lfScr_x, lfScr_y, `slit-lens ${slitToLensFront_mm.toFixed(0)} mm`, 38, 1);

  // ---- DIMENSION LINES ----

  // Box width (bottom)
  drawDimension(bx0, by1 + 5, bx1, by1 + 5, `${boxW_mm.toFixed(0)} mm`, 22, 1);

  // Box height (right side)
  drawDimension(bx1 + 5, by1, bx1 + 5, by0, `${boxH_mm.toFixed(0)} mm`, 22, 1);

  // Slit to grating
  drawDimension(slSx, slSy, grSx, grSy, `${p.slitDist} mm`, 20, 1);

  // Grating to sensor center
  drawDimension(grSx, grSy, scSx, scSy, `${p.sensorDist} mm`, 20, -1);

  // Sensor length
  const sensorSpanMm = Math.abs(sMaxS - sMinS);
  const totalSensorMm = sensorSpanMm + 2 * sensorMargin_mm;
  drawDimension(ss1x, ss1y, ss2x, ss2y, `${totalSensorMm.toFixed(1)} mm`, 24, 1);

  // ---- Position from walls ----
  const slitFromLeft = slitX_mm - boxMinX;
  const slitFromBottom = slitY_mm - boxMinY;
  const grFromLeft = 0 - boxMinX;
  const grFromBottom = 0 - boxMinY;

  ctx.fillStyle = '#7a9ec2';
  ctx.font = '11px Arial';

  // Slit from left wall
  ctx.setLineDash([2,3]);
  ctx.strokeStyle = 'rgba(74,111,165,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(bx0, slSy); ctx.lineTo(slSx - 16, slSy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign = 'left';
  ctx.fillText(`${slitFromLeft.toFixed(0)} mm`, bx0 + 4, slSy - 6);

  // Grating from left wall
  ctx.setLineDash([2,3]);
  ctx.strokeStyle = 'rgba(74,111,165,0.3)';
  ctx.beginPath(); ctx.moveTo(bx0, grSy); ctx.lineTo(grSx - grDrawLen - 4, grSy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign = 'left';
  ctx.fillText(`${grFromLeft.toFixed(0)} mm`, bx0 + 4, grSy - 6);


  // ---- SENSOR POSITION: projection lines to grating and optical axis ----
  // First and last hit = spectrum endpoints
  const hitFirst = hits[0];
  const hitLast = hits[hits.length - 1];
  // Sensor center
  const sensorEndpoints = [
    { label: `${hitFirst.nm}nm`, x: hitFirst.x, y: hitFirst.y },
    { label: `${hitLast.nm}nm`, x: hitLast.x, y: hitLast.y },
  ];

  // Draw optical axis (X axis through grating)
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(bx0, grSy);
  ctx.lineTo(bx1, grSy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffffff33';
  ctx.font = '10px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('optical axis', bx1 - 4, grSy - 4);

  // Draw vertical reference through grating
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(grSx, by0);
  ctx.lineTo(grSx, by1);
  ctx.stroke();
  ctx.setLineDash([]);

  // For each sensor endpoint, draw horizontal and vertical projection lines
  const projColors = ['#66ddaa', '#ddaa66'];
  sensorEndpoints.forEach((ep, idx) => {
    const [epSx, epSy] = toScr(ep.x, ep.y);
    const color = projColors[idx];

    // Vertical projection line: from endpoint down/up to optical axis (y=0)
    const [, axSy] = toScr(ep.x, 0);
    ctx.strokeStyle = color + '55';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(epSx, epSy);
    ctx.lineTo(epSx, axSy);
    ctx.stroke();

    // Horizontal projection line: from endpoint left to grating plane (x=0)
    const [grPx] = toScr(0, ep.y);
    ctx.beginPath();
    ctx.moveTo(epSx, epSy);
    ctx.lineTo(grPx, epSy);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label: horizontal distance from grating (X coordinate)
    ctx.fillStyle = color;
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    const hMidX = (epSx + grPx) / 2;
    ctx.fillText(`${ep.x.toFixed(1)}`, hMidX, epSy + (idx === 0 ? -5 : 14));

    // Label: vertical distance from axis (Y coordinate)
    const vMidY = (epSy + axSy) / 2;
    ctx.textAlign = 'left';
    ctx.fillText(`${ep.y.toFixed(1)}`, epSx + 4, vMidY + 4);

    // Small marker at endpoint
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(epSx, epSy, 4, 0, Math.PI * 2);
    ctx.fill();

    // Label the endpoint
    ctx.fillStyle = color;
    ctx.font = '10px Arial';
    ctx.textAlign = idx === 0 ? 'right' : 'left';
    ctx.fillText(ep.label, epSx + (idx === 0 ? -8 : 8), epSy - 8);
  });

  // ---- Diffraction angle arcs for min/max wavelength ----
  const betaMin = hits[0].beta;
  const betaMax = hits[hits.length-1].beta;
  const dArcR = 40;
  ctx.strokeStyle = 'rgba(233,69,96,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2,2]);
  ctx.beginPath();
  // Angles on screen: beta=0 means +X direction, positive beta means upward
  // On screen +X is right, +Y is down, so beta angle from +X axis going clockwise
  ctx.arc(grSx, grSy, dArcR, -betaMax, -betaMin, false);
  ctx.stroke();
  ctx.setLineDash([]);
  // Label angles
  ctx.fillStyle = '#e9456088';
  ctx.font = '10px Arial';
  ctx.textAlign = 'left';
  const betaMinDeg = (betaMin * 180 / Math.PI).toFixed(1);
  const betaMaxDeg = (betaMax * 180 / Math.PI).toFixed(1);
  ctx.fillText(`${betaMinDeg}°`, grSx + (dArcR+5)*Math.cos(-betaMin), grSy + (dArcR+5)*Math.sin(-betaMin) + 4);
  ctx.fillText(`${betaMaxDeg}°`, grSx + (dArcR+5)*Math.cos(-betaMax), grSy + (dArcR+5)*Math.sin(-betaMax) + 4);

  // ---- DIMS PANEL ----
  const dispersion = sensorSpanMm / (p.lambdaMax - p.lambdaMin);

  document.getElementById('dims').innerHTML = `
    <div class="item"><div class="lbl">Box (W x H)</div><div class="val">${boxW_mm.toFixed(0)} x ${boxH_mm.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">Sensor span</div><div class="val">${sensorSpanMm.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">Sensor total</div><div class="val">${totalSensorMm.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">Diffr. angles</div><div class="val">${betaMinDeg} to ${betaMaxDeg} deg</div></div>
    <div class="item"><div class="lbl">Spread</div><div class="val">${(Math.abs(betaMax - betaMin) * 180 / Math.PI).toFixed(1)} deg</div></div>
    <div class="item"><div class="lbl">Dispersion</div><div class="val">${dispersion.toFixed(3)} mm/nm</div></div>
    <div class="item"><div class="lbl">Slit from left</div><div class="val">${slitFromLeft.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">Grating from left</div><div class="val">${grFromLeft.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">Grating from bottom</div><div class="val">${grFromBottom.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">${hitFirst.nm}nm (X, Y)</div><div class="val">${hitFirst.x.toFixed(1)}, ${hitFirst.y.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">${hitLast.nm}nm (X, Y)</div><div class="val">${hitLast.x.toFixed(1)}, ${hitLast.y.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">Slit to lens front</div><div class="val">${slitToLensFront_mm.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">Slit to sensor</div><div class="val">${slitToSensor_mm.toFixed(0)} mm</div></div>
    <div class="item"><div class="lbl">Lens front (X, Y)</div><div class="val">${lensFront.x.toFixed(1)}, ${lensFront.y.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">Sensor (X, Y)</div><div class="val">${lensBack.x.toFixed(1)}, ${lensBack.y.toFixed(1)} mm</div></div>
    <div class="item"><div class="lbl">Camera captures</div><div class="val">${capturedMinNm !== null ? capturedMinNm + '-' + capturedMaxNm + 'nm' : 'nothing'}</div></div>
    <div class="item"><div class="lbl">Camera dispersion</div><div class="val">${capturedMinNm !== null && capturedMaxNm > capturedMinNm ? (p.cameraSensor / (capturedMaxNm - capturedMinNm)).toFixed(3) + ' mm/nm' : '-'}</div></div>
    <div class="item"><div class="lbl">0-order</div><div class="val" style="color:${zeroOrderOnSensor ? '#ff4444' : '#4a4'}">${zeroOrderOnSensor ? 'IN FRAME — will contaminate!' : 'outside frame'}</div></div>
  `;

  // Footer
  ctx.fillStyle = '#445';
  ctx.font = '11px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Transmission grating: d·(sin β - sin α) = m·λ  |  All dimensions in mm  |  Top-down view', 10, H - 10);
}

window.addEventListener('resize', draw);
draw();

document.getElementById('showCutout').addEventListener('click', () => {
  const p = getParams();
  const alpha = p.incAngleDeg * Math.PI / 180;
  const slitX_mm = -p.slitDist;
  const slitY_mm = 0;

  const step = 5;
  const rays = [];
  for (let lam = p.lambdaMin; lam <= p.lambdaMax; lam += step) {
    const beta = diffractionAngle(lam, p.N, p.incAngleDeg, p.m);
    if (beta !== null) rays.push({ nm: lam, beta });
  }
  if (rays.length < 2) return;

  const centralBeta = diffractionAngle((p.lambdaMin + p.lambdaMax) / 2, p.N, p.incAngleDeg, p.m);
  const scX = p.sensorDist * Math.cos(centralBeta);
  const scY = p.sensorDist * Math.sin(centralBeta);
  const stX = -Math.sin(centralBeta), stY = Math.cos(centralBeta);

  const hits = [];
  rays.forEach(({nm, beta}) => {
    const rdx = Math.cos(beta), rdy = Math.sin(beta);
    const det = rdx * stY - rdy * stX;
    if (Math.abs(det) < 1e-10) return;
    const t = (scX * stY - scY * stX) / det;
    const s = (scX * rdy - scY * rdx) / det;
    hits.push({ nm, beta, x: rdx * t, y: rdy * t, s, t });
  });
  if (hits.length < 2) return;

  const sMinS = Math.min(...hits.map(h => h.s));
  const sMaxS = Math.max(...hits.map(h => h.s));
  const sm = 3;
  const s1x = scX + stX * (sMinS - sm), s1y = scY + stY * (sMinS - sm);
  const s2x = scX + stX * (sMaxS + sm), s2y = scY + stY * (sMaxS + sm);

  const grTopX = Math.sin(alpha) * p.gratingHeight / 2;
  const grTopY = Math.cos(alpha) * p.gratingHeight / 2;
  const grBotX = -Math.sin(alpha) * p.gratingHeight / 2;
  const grBotY = -Math.cos(alpha) * p.gratingHeight / 2;
  const grBot = Math.min(grBotY, grTopY);
  const allX = [grTopX, grBotX, s1x, s2x, ...hits.map(h=>h.x)];
  const allY = [slitY_mm, grTopY, grBotY, s1y, s2y, ...hits.map(h=>h.y)];
  const wp = 10;
  const bMinX = slitX_mm;
  const bMaxX = Math.max(...allX) + wp + p.boxExtra;
  const bMinY = grBot - p.gratingGap;
  const bMaxY = Math.max(...allY) + wp;
  const bW = bMaxX - bMinX, bH = bMaxY - bMinY;

  const cdx = Math.cos(centralBeta), cdy = Math.sin(centralBeta);
  const lpx = -Math.sin(centralBeta), lpy = Math.cos(centralBeta);
  const lR = p.lensBodyDiam / 2;

  // Lens front (glass) at spectrum, barrel extends away from grating (+cdx, +cdy)
  const barrelLen = p.barrelLength;
  const lFront = { x: scX, y: scY };

  function wallCut(ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const vx0 = ax - lFront.x, vy0 = ay - lFront.y;
    // Barrel axis is (+cdx, +cdy) from glass toward sensor
    const a0 = vx0 * cdx + vy0 * cdy, da = dx * cdx + dy * cdy;
    const p0 = vx0 * lpx + vy0 * lpy, dp = dx * lpx + dy * lpy;
    let tMin = 0, tMax = 1;
    function clip(c0, dc, lo, hi) {
      if (Math.abs(dc) < 1e-10) { if (c0 < lo || c0 > hi) { tMin = 1; tMax = 0; } return; }
      let t1 = (lo - c0) / dc, t2 = (hi - c0) / dc;
      if (t1 > t2) { const tmp = t1; t1 = t2; t2 = tmp; }
      tMin = Math.max(tMin, t1); tMax = Math.min(tMax, t2);
    }
    clip(a0, da, 0, barrelLen);
    clip(p0, dp, -lR, lR);
    if (tMin >= tMax) return null;
    return { from: tMin, to: tMax, len: Math.sqrt((dx*(tMax-tMin))**2 + (dy*(tMax-tMin))**2) };
  }

  // Compute cuts on each wall (parametric: 0=start, 1=end of wall)
  const walls = [
    { name: 'Bottom', len: bW, cut: wallCut(bMinX, bMinY, bMaxX, bMinY) },
    { name: 'Right',  len: bH, cut: wallCut(bMaxX, bMinY, bMaxX, bMaxY) },
    { name: 'Top',    len: bW, cut: wallCut(bMaxX, bMaxY, bMinX, bMaxY) },
    { name: 'Left',   len: bH, cut: wallCut(bMinX, bMaxY, bMinX, bMinY) },
  ];

  // Slit position on left wall (left wall goes from top-left to bottom-left)
  // Left wall: from (bMinX, bMaxY) to (bMinX, bMinY), so t=0 is top, t=1 is bottom
  const slitT = (bMaxY - slitY_mm) / bH;

  // Grating on bottom wall: bottom goes from (bMinX, bMinY) to (bMaxX, bMinY)
  const gratingT = (0 - bMinX) / bW; // grating X=0

  // Build SVG: unfolded box — 4 walls laid out in a strip, scales to fit window
  const pad = 40;
  const wallDepth = 60; // box depth in mm
  const totalW = 2 * (bW + bH);
  const svgW = totalW + 2 * pad;
  const svgH = wallDepth + 2 * pad + 70;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="xMidYMid meet">`;
  svg += `<rect width="100%" height="100%" fill="white"/>`;
  svg += `<text x="${svgW/2}" y="16" text-anchor="middle" font-size="8" font-family="Arial" font-weight="bold">Spectrometer Box Cutout — unfold and cut</text>`;
  svg += `<text x="${svgW/2}" y="26" text-anchor="middle" font-size="5" font-family="Arial" fill="#666">Box: ${bW.toFixed(0)}x${bH.toFixed(0)}mm | Grating: ${p.N} l/mm | ${p.lambdaMin}-${p.lambdaMax}nm</text>`;

  const y0 = pad;
  let x = pad;
  const dH = wallDepth;
  const arrH = 2.5; // arrowhead half-width
  const arrL = 1.5; // arrowhead length

  // SVG dimension arrow helper: horizontal arrow with label, at given y
  function dimArrow(x1, x2, y, label, color, above) {
    if (Math.abs(x2 - x1) < 0.5) return '';
    const dir = above ? -1 : 1;
    const ty = y + dir * 5;
    const ay = y;
    let s = '';
    // line
    s += `<line x1="${x1}" y1="${ay}" x2="${x2}" y2="${ay}" stroke="${color}" stroke-width="0.3"/>`;
    // left arrowhead
    s += `<polygon points="${x1},${ay} ${x1+arrL},${ay-arrH} ${x1+arrL},${ay+arrH}" fill="${color}"/>`;
    // right arrowhead
    s += `<polygon points="${x2},${ay} ${x2-arrL},${ay-arrH} ${x2-arrL},${ay+arrH}" fill="${color}"/>`;
    // label
    s += `<text x="${(x1+x2)/2}" y="${ty}" text-anchor="middle" font-size="3.5" font-family="Arial" fill="${color}">${label}</text>`;
    return s;
  }

  walls.forEach((w, i) => {
    const wMm = w.len;

    // Wall rectangle
    svg += `<rect x="${x}" y="${y0}" width="${wMm}" height="${dH}" fill="none" stroke="black" stroke-width="0.5"/>`;

    // Wall label
    svg += `<text x="${x + wMm/2}" y="${y0 - 8}" text-anchor="middle" font-size="5" font-family="Arial" font-weight="bold">${w.name}</text>`;

    // Fold line (dashed) between walls
    if (i > 0) {
      svg += `<line x1="${x}" y1="${y0 - 2}" x2="${x}" y2="${y0 + dH + 2}" stroke="#aaa" stroke-width="0.3" stroke-dasharray="2,1.5"/>`;
    }

    // Full wall dimension arrow above
    svg += dimArrow(x, x + wMm, y0 - 3, `${wMm.toFixed(0)}mm`, '#333', true);

    // Lens cut (red rectangle on wall)
    if (w.cut) {
      const cx1 = x + w.cut.from * wMm;
      const cx2 = x + w.cut.to * wMm;
      svg += `<rect x="${cx1}" y="${y0}" width="${cx2 - cx1}" height="${dH}" fill="rgba(255,100,0,0.2)" stroke="#ff6600" stroke-width="0.7"/>`;
      svg += `<text x="${(cx1+cx2)/2}" y="${y0 + dH/2 + 1.5}" text-anchor="middle" font-size="3.5" font-family="Arial" fill="#ff6600" font-weight="bold">LENS CUT</text>`;
      // Dimension arrows: left edge to cut start, cut width, cut end to right edge
      const dimY = y0 + dH + 8;
      if (w.cut.from > 0.02) {
        svg += dimArrow(x, cx1, dimY, `${(w.cut.from * wMm).toFixed(0)}`, '#ff6600', false);
      }
      svg += dimArrow(cx1, cx2, dimY + 7, `${w.cut.len.toFixed(0)}mm`, '#ff6600', false);
      if (w.cut.to < 0.98) {
        svg += dimArrow(cx2, x + wMm, dimY, `${((1 - w.cut.to) * wMm).toFixed(0)}`, '#ff6600', false);
      }
    }

    // Slit on left wall
    if (w.name === 'Left') {
      const slitPos = slitT * wMm;
      const slitW = 2;
      svg += `<rect x="${x + slitPos - slitW/2}" y="${y0}" width="${slitW}" height="${dH}" fill="rgba(255,255,0,0.3)" stroke="#cc0" stroke-width="0.7"/>`;
      svg += `<text x="${x + slitPos}" y="${y0 + dH/2 + 1.5}" text-anchor="middle" font-size="3.5" font-family="Arial" fill="#aa8800" font-weight="bold">SLIT</text>`;
      // Dimension: left edge to slit, slit to right edge
      const dimY = y0 + dH + 8;
      if (slitPos > 2) {
        svg += dimArrow(x, x + slitPos, dimY, `${slitPos.toFixed(0)}mm`, '#aa8800', false);
      }
      if (wMm - slitPos > 2) {
        svg += dimArrow(x + slitPos, x + wMm, dimY, `${(wMm - slitPos).toFixed(0)}mm`, '#aa8800', false);
      }
    }

    // Grating mark on bottom wall
    if (w.name === 'Bottom') {
      const gPos = gratingT * wMm;
      svg += `<line x1="${x + gPos}" y1="${y0}" x2="${x + gPos}" y2="${y0 + dH}" stroke="#e94560" stroke-width="0.5" stroke-dasharray="2,1.5"/>`;
      svg += `<text x="${x + gPos}" y="${y0 + dH/2 + 1.5}" text-anchor="middle" font-size="3.5" font-family="Arial" fill="#e94560">GRATING</text>`;
      // Dimension: left edge to grating, grating to right edge
      const dimY = y0 + dH + 8;
      if (gPos > 2) {
        svg += dimArrow(x, x + gPos, dimY, `${gPos.toFixed(0)}mm`, '#e94560', false);
      }
      if (wMm - gPos > 2) {
        svg += dimArrow(x + gPos, x + wMm, dimY, `${(wMm - gPos).toFixed(0)}mm`, '#e94560', false);
      }
    }

    x += wMm;
  });

  // Close SVG
  svg += `</svg>`;

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Box Cutout</title><style>
    body { margin: 0; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    svg { flex: 1; background: white; }
    .actions { padding: 8px; text-align: center; background: #eee; }
    button { padding: 8px 20px; font-size: 14px; cursor: pointer; margin: 0 8px; }
  </style></head><body>
    <div class="actions">
      <button onclick="window.print()">Print</button>
    </div>
    ${svg}
  </body></html>`);
  w.document.close();
});
</script>
</body>
</html>
